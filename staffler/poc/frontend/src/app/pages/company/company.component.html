<!--
  Pilot feedback 2026-05-19 (item 7 re-re-re-fix): on desktop we render
  the sidenav as a plain <aside> instead of routing it through PrimeNG's
  p-drawer. Reason: p-drawer always runs an Angular Animations player
  (even with transitionOptions='0s'), and its appendContainer / overlay
  reparenting fights Bryntum's DOM rebuild on a Dag/Week/2-weken
  viewPreset switch — Angular Animations throws 'Cannot append
  HTMLDivElement to dps-company', the renderer pipeline derails,
  Bryntum's tree-store hits a null parent (`Cannot read isRoot`) and the
  planning eventStore ends up empty until F5.

  Mobile still uses p-drawer for the slide-out modal — there's no
  Bryntum surface competing for the host on mobile widths.
-->
@if (isMobileScreen()) {
  <p-drawer
    [visible]="isSidenavVisible()"
    [modal]="true"
    position="left"
    appendTo="body"
    styleClass="w-auto border-none shadow-none bg-transparent"
    blockScroll
    (onHide)="hideSidenav()"
  >
    <ng-template #headless>
      <dps-main-menu class="h-full"></dps-main-menu>
    </ng-template>
  </p-drawer>
} @else if (isSidenavVisible()) {
  <aside class="relative w-auto h-full bg-transparent">
    <dps-main-menu class="h-full"></dps-main-menu>
  </aside>
}

<router-outlet></router-outlet>
