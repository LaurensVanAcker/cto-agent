<header class="flex align-items-center gap-3 flex-wrap">
  <h1 class="text-2xl font-semibold m-0">Planning (PoC)</h1>

  <p-selectButton
    [options]="viewOptions"
    [(ngModel)]="view"
    optionLabel="label"
    optionValue="value"
    (onChange)="onViewChange()"
  />

  <span class="flex-1"></span>

  <button type="button" class="p-link" (click)="previousWeek()" pTooltip="Vorige week">
    <span class="dps-icon dps-icon-chevron rotate-180"></span>
  </button>
  <span class="font-medium">{{ weekLabel() }}</span>
  <button type="button" class="p-link" (click)="nextWeek()" pTooltip="Volgende week">
    <span class="dps-icon dps-icon-chevron"></span>
  </button>
  <p-button label="Vandaag" severity="secondary" [text]="true" (onClick)="today()" />
  <p-button
    icon="dps-icon dps-icon-add"
    label="Nieuwe shift"
    (onClick)="openShiftBatchDialog()"
  />
</header>

<p-toast position="bottom-right" />

<div class="poc-scheduler-host flex-auto">
  <bryntum-scheduler
    #scheduler
    [resources]="resources()"
    [events]="events()"
    [startDate]="startDate()"
    [endDate]="endDate()"
    [config]="schedulerConfig()"
    (onScheduleClick)="onCellClick($event)"
    (onEventClick)="onEventClick($event)"
  ></bryntum-scheduler>
</div>
