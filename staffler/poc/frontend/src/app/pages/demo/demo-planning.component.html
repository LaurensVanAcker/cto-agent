<header class="flex align-items-center gap-3 flex-wrap">
  <h1 class="text-2xl font-semibold m-0">Planning (demo)</h1>
  <span class="demo-pill">Mock data — geen API-calls</span>

  <p-selectButton
    [options]="viewOptions"
    [(ngModel)]="view"
    optionLabel="label"
    optionValue="value"
  />

  <p-selectButton
    [options]="zoomOptions"
    [(ngModel)]="zoom"
    optionLabel="label"
    optionValue="value"
  />

  <span class="flex-1"></span>

  <button type="button" class="p-link" (click)="previousWeek()" pTooltip="Vorige">
    <span class="dps-icon dps-icon-chevron rotate-180"></span>
  </button>
  <span class="font-medium">{{ weekLabel() }}</span>
  <button type="button" class="p-link" (click)="nextWeek()" pTooltip="Volgende">
    <span class="dps-icon dps-icon-chevron"></span>
  </button>
  <p-button label="Vandaag" severity="secondary" [text]="true" (onClick)="today()" />
</header>

<div class="poc-scheduler-host flex-auto">
  <bryntum-scheduler
    cls="border-round-bottom-md"
    [resources]="resources()"
    [events]="events()"
    [startDate]="startDate()"
    [endDate]="endDate()"
    [viewPreset]="schedulerConfig().viewPreset!"
    [columns]="schedulerConfig().columns!"
    [eventStyle]="schedulerConfig().eventStyle!"
    [rowHeight]="schedulerConfig().rowHeight!"
    [mode]="schedulerConfig().mode ?? 'horizontal'"
    [weekStartDay]="schedulerConfig().weekStartDay!"
    [allowOverlap]="schedulerConfig().allowOverlap!"
    [fillTicks]="schedulerConfig().fillTicks!"
    [timeRanges]="schedulerConfig().timeRanges!"
    [createEventOnDblClick]="false"
    [hideRowHover]="false"
    [nonWorkingTimeFeature]="true"
    [cellEditFeature]="false"
    [eventResizeFeature]="false"
    [scheduleMenuFeature]="false"
    [eventMenuFeature]="false"
    [eventTooltipFeature]="false"
    [scheduleTooltipFeature]="false"
    [timeAxisHeaderMenuFeature]="false"
    [eventDragFeature]="false"
    [eventDragCreateFeature]="false"
    [cellTooltipFeature]="false"
    [timeRangesFeature]="true"
  ></bryntum-scheduler>
</div>
