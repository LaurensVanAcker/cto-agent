<header class="flex justify-content-between align-items-center p-3 z-1">
  <img
    src="assets/images/logo-with-title.svg"
    alt="staffler"
    class="w-10rem h-auto"
  />

  <dps-app-locale-selector></dps-app-locale-selector>
</header>

<form
  autocomplete="on"
  class="flex flex-column flex-1 gap-3 p-5 sm:align-self-center w-full max-w-30rem justify-content-center"
  [formGroup]="form"
  (ngSubmit)="login()"
>
  <img src="assets/images/logo-with-title.svg" class="mb-5 z-1" alt="staffler — the staff planner" />

  <img
    src="assets/images/logo-icon.svg"
    alt=""
    class="background-logo"
  />

  <p-iconfield>
    <p-inputicon styleClass="dps-icon dps-icon-person" />
    <input
      type="text"
      pInputText
      pSize="large"
      name="email"
      inputId="email"
      autocomplete="username email"
      formControlName="email"
      [placeholder]="'AUTH.EMAIL_LABEL' | translate"
      class="w-full"
    />
  </p-iconfield>

  <p-iconfield>
    <p-inputicon styleClass="dps-icon dps-icon-lock z-1" />

    <p-password
      size="large"
      autocomplete="current-password"
      styleClass="w-full"
      inputStyleClass="w-full"
      [placeholder]="'AUTH.PASSWORD_LABEL' | translate"
      [feedback]="false"
      [toggleMask]="true"
      formControlName="password"
      inputId="password"
      name="password"
      [inputStyle]="{ 'padding-left': '40px' }"
    ></p-password>
  </p-iconfield>

  <a [routerLink]="forgotPasswordRoute" class="z-5 align-self-start text-white">
    {{ 'AUTH.FORGOT_PASSWORD' | translate }}
  </a>

  <p-button
    type="submit"
    styleClass="w-full"
    size="large"
    [label]="'AUTH.LOGIN' | translate"
    [loading]="inProcess()"
  ></p-button>
</form>

<dps-legal-info-footer class="text-white"></dps-legal-info-footer>

<p-toast> </p-toast>
