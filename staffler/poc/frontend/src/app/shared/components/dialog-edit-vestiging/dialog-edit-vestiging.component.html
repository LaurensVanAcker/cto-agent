<div class="flex flex-column gap-3 p-3">
  <p class="m-0 text-color-secondary text-sm">
    Het adres van deze vestiging wordt automatisch ingevuld op elk contract
    dat hier vertrekt — wijzigingen werken meteen door.
  </p>

  <label class="flex flex-column gap-1">
    <span class="text-sm">Naam vestiging *</span>
    <input pInputText [formControl]="nameControl" />
    @if (nameControl.touched && nameControl.invalid) {
      <small class="text-red-600">Naam is verplicht (min. 2 tekens).</small>
    }
  </label>

  <dps-address-autocomplete-field
    label="Plaats tewerkstelling"
    [control]="addressControl"
  />

  @if (error()) {
    <p class="m-0 text-red-600 text-sm">{{ error() }}</p>
  }

  <!--
    Danger-zone: visually demarcated red-tinted block so the destructive
    action lives well apart from "Opslaan". Confirm via PrimeNG
    p-confirmDialog (same pattern as prod CompanyGroupsComponent).
  -->
  <div class="dialog-danger-zone mt-3">
    <div class="flex flex-column gap-1">
      <strong class="text-sm">Vestiging verwijderen</strong>
      <span class="text-xs text-color-secondary">
        Onomkeerbaar. Service locations worden los geknipt en moeten opnieuw
        gekoppeld worden.
      </span>
    </div>
    <button
      type="button"
      class="p-button p-button-outlined p-button-danger danger-zone-btn"
      (click)="confirmDelete()"
      [disabled]="saving()"
    >
      <span class="dps-icon dps-icon-delete"></span>
      <span>Verwijderen</span>
    </button>
  </div>

  <div class="flex justify-content-end gap-2 mt-2">
    <p-button label="Annuleren" severity="secondary" [text]="true" (onClick)="cancel()" />
    <p-button
      label="Opslaan"
      icon="dps-icon dps-icon-check"
      [disabled]="!canSave()"
      [loading]="saving()"
      (onClick)="save()"
    />
  </div>

  <p-confirmDialog />
</div>
