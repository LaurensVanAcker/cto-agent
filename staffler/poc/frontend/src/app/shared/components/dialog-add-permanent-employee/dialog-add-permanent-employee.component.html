<div class="flex flex-column gap-3 p-3">
  <p class="m-0 text-color-secondary text-sm">
    Vaste medewerkers worden volledig in de PoC-DB bewaard en triggeren
    geen Dimona. Ze verschijnen direct op de planning als <strong>(vast)</strong>-rij.
  </p>

  <label class="flex flex-column gap-1">
    <span class="text-sm">Voornaam</span>
    <input pInputText [(ngModel)]="form.firstName" autofocus />
  </label>

  <label class="flex flex-column gap-1">
    <span class="text-sm">Achternaam</span>
    <input pInputText [(ngModel)]="form.lastName" />
  </label>

  @if (error()) {
    <p class="text-red-600 text-sm m-0">{{ error() }}</p>
  }

  <div class="flex justify-content-end gap-2 mt-2">
    <p-button label="Annuleren" severity="secondary" [text]="true" (onClick)="cancel()" />
    <p-button
      label="Aanmaken"
      icon="dps-icon dps-icon-add"
      [disabled]="!canSave()"
      [loading]="saving()"
      (onClick)="save()"
    />
  </div>
</div>
