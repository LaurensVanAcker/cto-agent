<!--
  Vast-blok dialog. Date range + hours only. Chrome matches the m09 new-
  shift dialog so the two feel like the same dialog family.
-->
<div class="m09-dialog">
  <header class="m09-header">
    <h2>
      Vast blok voor <span class="pos">{{ employeeName }}</span>
    </h2>
    <button class="m09-x" type="button" (click)="cancel()" aria-label="Sluiten">
      <span class="dps-icon dps-icon-close"></span>
    </button>
  </header>

  <section class="m09-body">
    <div class="m09-field">
      <label class="m09-field-label">Datum</label>
      <div class="m09-daterange">
        <span class="dps-icon dps-icon-event-note"></span>
        <input type="date" [(ngModel)]="form.dateFrom" />
        <span class="m09-arrow">›</span>
        <input type="date" [(ngModel)]="form.dateTo" />
      </div>
    </div>

    <div class="m09-shift-card">
      <div class="m09-day-title">{{ dayTitle() }}</div>
      <div class="m09-time-row">
        <div></div>
        <div class="m09-col-heads">
          <span>Van</span><span></span><span>Tot</span>
        </div>
        <div class="m09-row-label">Werkuren</div>
        <div class="m09-time-pair">
          <input type="time" [(ngModel)]="form.fromTime" />
          <span class="m09-arr">›</span>
          <input type="time" [(ngModel)]="form.toTime" />
        </div>
      </div>
    </div>

    @if (error()) {
      <div class="m09-error">{{ error() }}</div>
    }
  </section>

  <footer class="m09-footer">
    <button type="button" class="m09-btn-cancel" (click)="cancel()">Annuleren</button>
    <button
      type="button"
      class="m09-btn-confirm"
      [class.disabled]="!canSave()"
      [disabled]="!canSave()"
      (click)="save()"
    >
      Bevestig vast blok
    </button>
  </footer>
</div>
