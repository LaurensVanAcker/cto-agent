<div class="flex flex-column gap-3 p-3">
  <p class="m-0 text-color-secondary text-sm">
    Deze service location heeft nog geen vestiging. Kies hieronder een
    vestiging om ze te koppelen — DPS-contracten gebruiken het adres van
    de gekoppelde vestiging.
  </p>

  <div class="flex flex-column gap-1">
    <span class="text-sm font-medium">Service location</span>
    <strong>{{ sl?.name }}</strong>
  </div>

  <label class="flex flex-column gap-1">
    <span class="text-sm">Vestiging *</span>
    <p-select
      [options]="branchOptions"
      [ngModel]="selectedBranchId()"
      (ngModelChange)="selectedBranchId.set($event)"
      optionLabel="label"
      optionValue="value"
      placeholder="Kies vestiging"
      appendTo="body"
    />
  </label>

  @if (error()) {
    <p class="m-0 text-red-600 text-sm">{{ error() }}</p>
  }

  <div class="flex justify-content-end gap-2 mt-2">
    <p-button label="Annuleren" severity="secondary" [text]="true" (onClick)="cancel()" />
    <p-button
      label="Koppelen"
      icon="dps-icon dps-icon-check"
      [disabled]="!canSave()"
      [loading]="saving()"
      (onClick)="save()"
    />
  </div>
</div>
